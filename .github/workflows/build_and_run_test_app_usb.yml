name: Build and Run USB Test Application

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Matrix with IDF releases for Build and Run jobs
x-idf-versions: &idf_versions
  ["release-v5.1", "release-v5.2", "release-v5.3", "release-v5.4", "release-v5.5", "latest"]

# Matrix with target runners for Run jobs
x-idf-targets: &idf_targets
  ["esp32s2", "esp32p4"]

jobs:
  build-device:
    name: Build USB Device apps
    strategy:
      matrix:
        idf_ver: *idf_versions
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Build USB Test Application
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          git config --global safe.directory $(pwd)
          pip install idf-build-apps==2.4.3 --upgrade
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"
          #export BUILD_DEVICE_IN_CI=yes

          # TODO: Investigate
          export OVERRIDE_USB_COMPONENT=no
          idf-build-apps find --paths device/esp_tinyusb
          idf-build-apps build --paths device/esp_tinyusb
      - uses: actions/upload-artifact@v4
        with:
          name: usb_device_test_app_bin_${{ matrix.idf_ver }}
          path: |
            **/test_app*/**/build_esp*/bootloader/bootloader.bin
            **/test_app*/**/build_esp*/partition_table/partition-table.bin
            **/test_app*/**/build_esp*/test_app_*.bin
            **/test_app*/**/build_esp*/test_app_*.elf
            **/test_app*/**/build_esp*/flasher_args.json
            **/test_app*/**/build_esp*/config/sdkconfig.json
          if-no-files-found: error

  build-host:
    name: Build USB Host apps
    strategy:
      matrix:
        idf_ver: *idf_versions
        usb_override: ["yes", "no"]
        exclude:
          - idf_ver: "release-v5.1"
            usb_override: "yes"
          - idf_ver: "release-v5.2"
            usb_override: "yes"
          - idf_ver: "release-v5.3"
            usb_override: "yes"
          #- idf_ver: "latest"
          #  usb_override: "no"

    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Build USB Test Application
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          git config --global safe.directory $(pwd)
          pip install idf-build-apps==2.4.3 --upgrade
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"
          export OVERRIDE_USB_COMPONENT=${{ matrix.usb_override }}
          #export BUILD_DEVICE_IN_CI=no

          idf-build-apps find --paths host/
          idf-build-apps build --paths host/
      - uses: actions/upload-artifact@v4
        with:
          name: usb_host_test_app_bin_${{ matrix.idf_ver }}_${{ matrix.usb_override }}
          path: |
            **/test_app*/**/build_esp*/bootloader/bootloader.bin
            **/test_app*/**/build_esp*/partition_table/partition-table.bin
            **/test_app*/**/build_esp*/test_app_*.bin
            **/test_app*/**/build_esp*/test_app_*.elf
            **/test_app*/**/build_esp*/flasher_args.json
            **/test_app*/**/build_esp*/config/sdkconfig.json
          if-no-files-found: error

  run-target-device:
    name: Run USB Device TestApps on target
    if: ${{ github.repository_owner == 'espressif' }}
    needs: build-device
    strategy:
      matrix:
        idf_ver: *idf_versions
        idf_target: *idf_targets
        exclude:
          # Exclude esp32p4 for releases before IDF 5.3 for all runner tags (esp32p4 support starts in IDF 5.3)
          - idf_ver: "release-v5.1"
            idf_target: "esp32p4"
          - idf_ver: "release-v5.2"
            idf_target: "esp32p4"

    runs-on: [self-hosted, linux, docker, "${{ matrix.idf_target }}", "usb_device"]
    container:
      image: python:3.11-bookworm
      options: --privileged --device-cgroup-rule="c 188:* rmw" --device-cgroup-rule="c 166:* rmw"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: usb_device_test_app_bin_${{ matrix.idf_ver }}
      - name: ⚙️ Install System tools
        run: |
          apt update
          apt install -y usbutils
      - name: Install Python packages
        env:
          PIP_EXTRA_INDEX_URL: "https://dl.espressif.com/pypi/"
        run: pip install --only-binary cryptography pytest-embedded pytest-embedded-serial-esp pytest-embedded-idf pyserial pyusb
      - name: Run USB Test App on target
        run: pytest --embedded-services esp,idf --target=${{ matrix.idf_target }} -m usb_device --build-dir=build_${{ matrix.idf_target }}

  run-target-host:
    name: Run USB Host TestApps on target
    if: ${{ github.repository_owner == 'espressif' }}
    needs: build-host
    strategy:
      matrix:
        idf_ver: *idf_versions
        usb_override: ["yes", "no"]
        idf_target: *idf_targets
        exclude:
          # Exclude esp32p4 for releases before IDF 5.3 for all runner tags (esp32p4 support starts in IDF 5.3)
          - idf_ver: "release-v5.1"
            idf_target: "esp32p4"
          - idf_ver: "release-v5.2"
            idf_target: "esp32p4"

          - idf_ver: "release-v5.1"
            usb_override: "yes"
          - idf_ver: "release-v5.2"
            usb_override: "yes"
          - idf_ver: "release-v5.3"
            usb_override: "yes"

    runs-on: [self-hosted, linux, docker, "${{ matrix.idf_target }}", "usb_host"]
    container:
      image: python:3.11-bookworm
      options: --privileged --device-cgroup-rule="c 188:* rmw" --device-cgroup-rule="c 166:* rmw"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: usb_host_test_app_bin_${{ matrix.idf_ver }}_${{ matrix.usb_override }}
      - name: ⚙️ Install System tools
        run: |
          apt update
          apt install -y usbutils
      - name: Install Python packages
        env:
          PIP_EXTRA_INDEX_URL: "https://dl.espressif.com/pypi/"
        run: pip install --only-binary cryptography pytest-embedded pytest-embedded-serial-esp pytest-embedded-idf pyserial pyusb
      - name: Run USB Test App on target
        run: pytest --embedded-services esp,idf --target=${{ matrix.idf_target }} -m usb_host --build-dir=build_${{ matrix.idf_target }}
