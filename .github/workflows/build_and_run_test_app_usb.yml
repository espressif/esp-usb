name: Build and Run USB Test Application

on:
  workflow_call:
    inputs:
      idf_releases:
        description: 'The JSON array of idf releases to build and run'
        required: true
        type: string
      idf_targets:
        description: 'The JSON array of targets for target runners'
        required: true
        type: string

jobs:
  build:
    name: Build USB apps
    strategy:
      matrix:
        idf_ver: ${{ fromJson(inputs.idf_releases) }}
        test_app: ["device", "host-native", "host-managed"]
        include:
          # Add build paths
          - test_app: device
            path: device/esp_tinyusb
            override: "no"  # For the completeness
          - test_app: host-native
            path: host
            override: "no"
          - test_app: host-managed
            path: host
            override: "yes"
        exclude:
          # Exclude usb component overriding for lower versions, only service releases
          - test_app: host-managed
            idf_ver: "release-v5.1"
          - test_app: host-managed
            idf_ver: "release-v5.2"
          - test_app: host-managed
            idf_ver: "release-v5.3"

    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Build USB Test Application
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          git config --global safe.directory $(pwd)
          pip install idf-build-apps==2.4.3 --upgrade
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"

          export OVERRIDE_USB_COMPONENT=${{ matrix.override }}

          idf-build-apps find --paths ${{ matrix.path }}
          idf-build-apps build --paths ${{ matrix.path }}
      - uses: actions/upload-artifact@v4
        with:
          name: usb_${{ matrix.test_app }}_test_app_bin_${{ matrix.idf_ver }}
          path: |
            **/test_app*/**/build_esp*/bootloader/bootloader.bin
            **/test_app*/**/build_esp*/partition_table/partition-table.bin
            **/test_app*/**/build_esp*/test_app_*.bin
            **/test_app*/**/build_esp*/test_app_*.elf
            **/test_app*/**/build_esp*/flasher_args.json
            **/test_app*/**/build_esp*/config/sdkconfig.json
          if-no-files-found: error

  run:
    name: Run TestApps on target
    if: ${{ github.repository_owner == 'espressif' }}
    needs: build
    strategy:
      matrix:
        idf_ver: ${{ fromJson(inputs.idf_releases) }}
        idf_target: ${{ fromJson(inputs.idf_targets) }}
        test_app: ["device", "host-native", "host-managed"]
        include:
          # Link runner tag with test_app
          - test_app: device
            runner_tag: "usb_device"
          - test_app: host-native
            runner_tag: "usb_host"
          - test_app: host-managed
            runner_tag: "usb_host"
        exclude:
          # Exclude esp32p4 for releases before IDF 5.3 for all runner tags (esp32p4 support starts in IDF 5.3)
          - idf_ver: "release-v5.1"
            idf_target: "esp32p4"
          - idf_ver: "release-v5.2"
            idf_target: "esp32p4"
          # Exclude usb component overriding for lower versions, only service releases
          - test_app: host-managed
            idf_ver: "release-v5.1"
          - test_app: host-managed
            idf_ver: "release-v5.2"
          - test_app: host-managed
            idf_ver: "release-v5.3"

    runs-on: [self-hosted, linux, docker, "${{ matrix.idf_target }}", "${{ matrix.runner_tag }}"]
    container:
      image: python:3.11-bookworm
      options: --privileged --device-cgroup-rule="c 188:* rmw" --device-cgroup-rule="c 166:* rmw"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: usb_${{ matrix.test_app }}_test_app_bin_${{ matrix.idf_ver }}
      - name: ⚙️ Install System tools
        run: |
          apt update
          apt install -y usbutils
      - name: Install Python packages
        env:
          PIP_EXTRA_INDEX_URL: "https://dl.espressif.com/pypi/"
        run: pip install --only-binary cryptography pytest-embedded pytest-embedded-serial-esp pytest-embedded-idf pyserial pyusb
      - name: Run USB Test App on target
        run: pytest --embedded-services esp,idf --target=${{ matrix.idf_target }} -m ${{ matrix.runner_tag }} --build-dir=build_${{ matrix.idf_target }}
