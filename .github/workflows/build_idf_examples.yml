name: Build ESP-IDF USB examples

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        idf_ver:
          [
            "release-v5.1",
            "release-v5.2",
            "release-v5.3",
            "release-v5.4",
            "release-v5.5",
            "latest",
          ]
        idf_example:
          [
            "device",
            "host",
          ]
        exclude:
          - idf_ver: "release-v5.1"
            idf_example: "host"
          - idf_ver: "release-v5.2"
            idf_example: "host"
          - idf_ver: "release-v5.3"
            idf_example: "host"
        include:
          - idf_example: "device"
            override_component: "esp_tinyusb"
            override_path: "device/esp_tinyusb"
          - idf_example: "host"
            override_component: "usb"
            override_path: "host/usb"
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}
    env:
      USB_DEVICE_PATH: examples/peripherals/usb/device
      USB_HOST_PATH: examples/peripherals/usb/host
      MANIFEST_PATH: examples/peripherals/.build-test-rules.yml
      CONFIG_PATH: ${{ github.workspace }}/.github/ci/.build_idf_examples.toml

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: Install Python deps
        shell: bash
        run: |
          pip install idf-component-manager>=2.1.2 idf-build-apps==2.4.3 pyyaml --upgrade
      - name: Build ESP-IDF ${{ matrix.idf_ver }} USB ${{ matrix.idf_example }} examples
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          python .github/ci/override_managed_component.py ${{ matrix.override_component }} ${{ matrix.override_path }} ${IDF_PATH}/examples/peripherals/usb/${{ matrix.idf_example }}/*
          cd ${IDF_PATH}

          idf-build-apps find --config-file ${CONFIG_PATH}
          idf-build-apps build --config-file ${CONFIG_PATH}
