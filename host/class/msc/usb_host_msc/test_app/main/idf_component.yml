## IDF Component Manager Manifest File
dependencies:
  # Needed as DUT
  espressif/usb_host_msc:
    version: "*"
    override_path: "../../../usb_host_msc"

  # Needed for MSC mock device
  espressif/esp_tinyusb:
    version: "*"
    override_path: "../../../../../../device/esp_tinyusb"

  espressif/usb:
    version: "*"
    override_path: "../../../../../usb"
    matches:                                    # Both if clauses must be fulfilled to override the component
      - if: "$OVERRIDE_USB_COMPONENT == yes"    # Environmental variable to override USB Component
      - if: "idf_version >=5.4"                 # Override native esp-idf/usb component only for 5.4 and above
